[pytest]
# Pytest configuration for institutional-grade testing

# Test discovery
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    
    
    
    

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slow, require external services)
    schema: Schema validation tests
    data_quality: Data quality validation tests
    backfill: Backfill functionality tests
    slow: Slow running tests
    api: Tests requiring API access

# Coverage
cov_config = .coveragerc

# Logging
log_cli = false
log_cli_level = INFO

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
