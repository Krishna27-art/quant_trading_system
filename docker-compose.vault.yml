version: '3.8'

services:
  vault:
    image: vault:1.15
    cap_add: [IPC_LOCK]
    ports: ["8200:8200"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "dev-root-token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    volumes:
      - vault_data:/vault/data

  trading_app:
    build: .
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "${VAULT_TOKEN}"  # only this token in env
    depends_on: [vault]

volumes:
  vault_data:
