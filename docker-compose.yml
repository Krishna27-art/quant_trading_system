
services:
  # Database: PostgreSQL with TimescaleDB
  db:
    image: timescale/timescaledb:latest-pg14
    container_name: quant_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  # Message Queue / Cache: Redis
  redis:
    image: redis:alpine
    container_name: quant_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: always

  # Backend API: FastAPI
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quant_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - ENV=LOCAL
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    restart: unless-stopped

  # Frontend: Static file server
  frontend:
    image: nginx:alpine
    container_name: quant_frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

  # Monitoring: Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: quant_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: always

  # Monitoring: Grafana (moved to port 3001 to avoid conflict)
  grafana:
    image: grafana/grafana:latest
    container_name: quant_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: always

volumes:
  pgdata:
  redisdata:
